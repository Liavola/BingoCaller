<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bingo Caller</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <h1 class="title">Bingo Caller</h1>
    </header>

    <section class="display">
   <div class="current-ball" id="currentBall">

  <!-- 3D bal -->
  <div class="clip-circle">
    <div class="cube-wrapper">
      <div class="cube-2">
        <div class="cube">
          <div id="face1" class="face"></div>
          <div id="face2" class="face"></div>
          <div id="face3" class="face"></div>
          <div id="face4" class="face"></div>
          <div id="face5" class="face"></div>
          <div id="face6" class="face"></div>
          <div id="face7" class="face"></div>
          <div id="face8" class="face"></div>

          <!-- Nummer op 4 kanten zodat het altijd zichtbaar is -->
          <div class="ball-number num1">
            <div class="ball-letter" id="ballLetter1"></div>
            <div class="ball-num" id="ballNumber1">–</div>
          </div>
          <div class="ball-number num2">
            <div class="ball-letter" id="ballLetter2"></div>
            <div class="ball-num" id="ballNumber2">–</div>
          </div>
          <div class="ball-number num3">
            <div class="ball-letter" id="ballLetter3"></div>
            <div class="ball-num" id="ballNumber3">–</div>
          </div>
          <div class="ball-number num4">
            <div class="ball-letter" id="ballLetter4"></div>
            <div class="ball-num" id="ballNumber4">–</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="circle lighting"></div>

</div>
      <div class="previous-calls" id="previousCalls"></div>
    </section>

    <section class="controls">
      <button class="btn btn-primary" id="callBtn">Volgende</button>
      <button class="btn btn-secondary" id="autoBtn">Start Automatisch</button>
      <button class="btn btn-tertiary" id="resetBtn">Opnieuw</button>
    </section>

    <section class="settings">
      <label for="intervalSlider" class="slider-label">
        Interval: <span id="intervalValue">3.0</span>s
      </label>
      <input
        type="range"
        id="intervalSlider"
        min="1"
        max="15"
        step="0.5"
        value="3"
        class="slider"
      >
      <label class="checkbox-label">
        <input type="checkbox" id="voiceToggle" checked>
        <span>Spraakaankondigingen</span>
      </label>
    </section>

    <section class="board">
      <div class="board-column" data-letter="B"></div>
      <div class="board-column" data-letter="I"></div>
      <div class="board-column" data-letter="N"></div>
      <div class="board-column" data-letter="G"></div>
      <div class="board-column" data-letter="O"></div>
    </section>

    <footer class="stats">
      <span>Gevallen: <strong id="calledCount">0</strong> / 75</span>
      <span>Resterend: <strong id="remainingCount">75</strong></span>
    </footer>
  </main>

  <script src="js/config.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/bingo.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

  <audio id="bgMusic" loop>
  <source src="audio/silence.mp3" type="audio/mpeg">
</audio>
</body>
</html>
